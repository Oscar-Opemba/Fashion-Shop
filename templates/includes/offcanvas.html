{% load static %}
{# slicknav clones .mobile-menu from the header into #mobile-menu-wrap. #}
<div class="offcanvas-menu-overlay"></div>
<div class="offcanvas-menu-wrapper">
    <div class="offcanvas__option">
        <div class="offcanvas__links">
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' %}">My account</a>
                <a href="{% url 'orders:history' %}">My orders</a>
            {% else %}
                <a href="{% url 'account_login' %}">Sign in</a>
                <a href="{% url 'account_signup' %}">Register</a>
            {% endif %}
        </div>
    </div>
    <div class="offcanvas__nav__option">
        <a href="#" class="search-switch" aria-label="Search">
            <img src="{% static 'img/icon/search.png' %}" alt=""></a>
        <a href="{% url 'cart:detail' %}" aria-label="Cart">
            <img src="{% static 'img/icon/cart.png' %}" alt="">
            <span data-cart-count>{{ cart|length }}</span>
        </a>
        <div class="price" data-cart-total>KES {{ cart.get_total_price|floatformat:2 }}</div>
    </div>
    <div id="mobile-menu-wrap"></div>
    <div class="offcanvas__text">
        <p>Free shipping, 30-day return or refund guarantee.</p>
    </div>
</div>
