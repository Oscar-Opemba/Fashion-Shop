{% extends 'base.html' %}

{% block title %}Delete address{% endblock %}

{% block content %}
<section class="checkout spad">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-9">
                <div class="checkout__form">
                    <h4>Delete this address?</h4>
                    <p>{{ address.full_name }}<br>{{ address.street }}<br>
                        {{ address.town }}, {{ address.county }}</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="site-btn">Yes, delete</button>
                        <a href="{% url 'accounts:profile' %}" class="link-button">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
